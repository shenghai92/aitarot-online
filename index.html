<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Tarot AI | Free Tarot Reading, Tarot Card Reading & Bazi</title>
    <meta
      name="description"
      content="Free tarot reading first, deeper paid tarot card reading and Bazi guidance after. Privacy-first, multilingual, and built for love, career, and life clarity."
    />
    <meta property="og:title" content="Love Tarot AI | Free Tarot Reading, Tarot Card Reading & Bazi" />
    <meta
      property="og:description"
      content="Get a free tarot reading, then unlock deeper love, career, and Bazi-guided answers when you need more detail."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#071120" />
    <link rel="stylesheet" href="styles.css?v=20260529b" />
  </head>
  <body>
    <header class="site-header">
      <div class="nav-shell">
        <a class="brand-lockup" href="#top" aria-label="Love Tarot AI home">
          <span class="brand-mark">LT</span>
          <span>
            <strong class="brand-name" id="brand-name">Love Tarot AI</strong>
            <span class="brand-sub" id="brand-sub">aitarot.online</span>
          </span>
        </a>
        <nav class="top-nav" id="top-nav"></nav>
        <div class="lang-switch" aria-label="Language switcher">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ja">JA</button>
          <button class="lang-btn" data-lang="ko">KO</button>
          <button class="lang-btn" data-lang="de">DE</button>
          <button class="lang-btn" data-lang="fr">FR</button>
        </div>
      </div>
    </header>

    <main id="top">
      <section class="hero section">
        <div class="hero-copy">
          <p class="eyebrow" id="hero-eyebrow"></p>
          <h1 id="hero-title"></h1>
          <p class="hero-text" id="hero-text"></p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="#free" id="hero-cta-primary"></a>
            <a class="btn btn-secondary" href="#plans" id="hero-cta-secondary"></a>
            <a class="btn btn-secondary" href="./bazi-guide.html" id="hero-cta-tertiary"></a>
          </div>
        </div>
        <div class="hero-orbit">
          <div class="orbit-card">
            <span class="orbit-kicker" id="orbit-kicker"></span>
            <h2 id="orbit-title"></h2>
            <p id="orbit-text"></p>
            <div class="orbit-tags" id="orbit-tags"></div>
          </div>
        </div>
      </section>

      <section class="signal-strip section">
        <div class="signal-grid" id="signal-grid"></div>
      </section>

      <section class="section" id="free">
        <div class="section-heading">
          <p class="section-kicker" id="free-kicker"></p>
          <h2 id="free-title"></h2>
          <p id="free-text"></p>
        </div>
        <div class="free-layout">
          <div class="free-tool">
            <label for="free-topic" id="free-label"></label>
            <select id="free-topic"></select>
            <button class="btn btn-primary" id="free-draw"></button>
            <div class="free-result" id="free-result" aria-live="polite"></div>
          </div>
          <div class="free-preview">
            <h3 id="free-preview-title"></h3>
            <div class="preview-points" id="free-preview-points"></div>
          </div>
        </div>
      </section>

      <section class="section section-band" id="reading-room">
        <div class="section-heading">
          <p class="section-kicker" id="room-kicker"></p>
          <h2 id="room-title"></h2>
          <p id="room-text"></p>
        </div>
        <div class="room-layout">
          <form class="reading-form" id="reading-form">
            <div class="field-grid">
              <label class="field">
                <span id="field-focus-label"></span>
                <select id="reading-focus"></select>
              </label>
              <label class="field">
                <span id="field-tier-label"></span>
                <select id="reading-tier"></select>
              </label>
            </div>
            <label class="field">
              <span id="field-question-label"></span>
              <textarea id="reading-question" rows="6" maxlength="600"></textarea>
            </label>
            <button class="btn btn-primary" type="submit" id="reading-submit"></button>
          </form>
          <div class="reading-output" id="reading-output">
            <div class="reading-placeholder" id="reading-placeholder"></div>
          </div>
        </div>
      </section>

      <section class="section" id="plans">
        <div class="section-heading">
          <p class="section-kicker" id="plans-kicker"></p>
          <h2 id="plans-title"></h2>
          <p id="plans-text"></p>
        </div>
        <div class="plans-wrap">
          <div class="cards-grid" id="single-plans"></div>
          <div class="cards-grid" id="focus-plans"></div>
          <div class="cards-grid" id="member-plans"></div>
        </div>
      </section>

      <section class="section section-band" id="difference">
        <div class="section-heading">
          <p class="section-kicker" id="difference-kicker"></p>
          <h2 id="difference-title"></h2>
          <p id="difference-text"></p>
        </div>
        <div class="difference-grid" id="difference-grid"></div>
      </section>

      <section class="section" id="focus">
        <div class="section-heading">
          <p class="section-kicker" id="focus-kicker"></p>
          <h2 id="focus-title"></h2>
          <p id="focus-text"></p>
        </div>
        <div class="focus-grid" id="focus-grid"></div>
      </section>

      <section class="section section-band" id="bazi">
        <div class="section-heading">
          <p class="section-kicker" id="bazi-kicker"></p>
          <h2 id="bazi-title"></h2>
          <p id="bazi-text"></p>
        </div>
        <div class="bazi-layout">
          <div class="bazi-copy">
            <div class="bazi-points" id="bazi-points"></div>
            <a class="btn btn-secondary" href="./bazi-guide.html" id="bazi-link"></a>
          </div>
          <div class="bazi-card">
            <p class="bazi-quote" id="bazi-quote"></p>
          </div>
        </div>
      </section>

      <section class="section" id="privacy">
        <div class="section-heading">
          <p class="section-kicker" id="privacy-kicker"></p>
          <h2 id="privacy-title"></h2>
          <p id="privacy-text"></p>
        </div>
        <div class="privacy-grid" id="privacy-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="footer-brandline">
            <span class="brand-mark">LT</span>
            <span class="footer-brandname" id="footer-brand-name"></span>
          </div>
          <p id="footer-description"></p>
          <p>
            <span id="footer-support-label"></span>
            <a href="mailto:support@aitarot.online">support@aitarot.online</a>
          </p>
        </div>
        <div>
          <h3 id="footer-company-title"></h3>
          <div class="footer-links" id="footer-company-links"></div>
        </div>
        <div>
          <h3 id="footer-resources-title"></h3>
          <div class="footer-links" id="footer-resource-links"></div>
        </div>
        <div>
          <h3 id="footer-popular-title"></h3>
          <div class="footer-links" id="footer-popular-links"></div>
        </div>
      </div>
      <div class="footer-bottom">
        <p id="footer-copyright"></p>
        <p id="footer-tagline"></p>
      </div>
    </footer>

    <script src="script.js?v=20260529b"></script>
  </body>
</html>
